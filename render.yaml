# Render Blueprint：單一 Docker web service（FastAPI 同時提供 API + 前端）。
# 資料持久化靠 Dockerfile 內的 Litestream → Backblaze B2（Render 免費無持久磁碟）。
# 部署：Render → New → Blueprint → 選這個 repo；secrets（sync:false）在建立時填。
services:
  - type: web
    name: hs-story
    runtime: docker
    plan: free
    dockerfilePath: ./deploy/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: HS_DB_PATH
        value: /data/hs.db
      # --- 應用祕密（建立時在 Render 填）---
      # 選用：只有後台「AI 產草稿」會用到；留空不影響上線（該功能回 503，
      # 仍可在後台手動寫/編輯/發佈文章）。之後要 AI 草稿再補（或改接免費供應商）。
      - key: ANTHROPIC_API_KEY
        sync: false
      # 必填：後台登入密碼
      - key: ADMIN_PASSWORD
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      # --- Litestream → B2 ---
      - key: B2_BUCKET
        sync: false
      - key: B2_ENDPOINT
        sync: false
      - key: B2_REGION
        sync: false
      - key: LITESTREAM_ACCESS_KEY_ID
        sync: false
      - key: LITESTREAM_SECRET_ACCESS_KEY
        sync: false
