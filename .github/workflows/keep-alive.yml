name: keep-alive

# 目的：Render 免費方案閒置約 15 分鐘就會休眠，下次請求需冷啟動（30~60 秒）。
# 這裡每 10 分鐘打一次 /api/health 讓服務保持喚醒，避免使用者遇到冷啟動延遲。
#
# 備註：
# - GitHub 排程（schedule）在尖峰時可能延遲數分鐘至十幾分鐘觸發，非精準時鐘；
#   若仍偶爾遇到冷啟動，改用 UptimeRobot/cron-job.org 這類外部監控會更準時。
# - 公開 repo 的排程 workflow 免費；但 repo 連續 60 天無提交時，GitHub 會自動停用排程，
#   屆時到 Actions 頁面按 Enable 即可恢復。
# - 可到 Actions → keep-alive → Run workflow 手動觸發測試。

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# 同時間只跑一個，避免排程塞車時堆疊。
concurrency:
  group: keep-alive
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping health endpoint
        env:
          URL: https://hs-story.onrender.com/api/health
        run: |
          echo "Pinging $URL ..."
          # 冷啟動可能較久，給到 90 秒；重試 3 次。
          for i in 1 2 3; do
            code=$(curl -sS -o /tmp/body -w '%{http_code}' --max-time 90 "$URL" || echo 000)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "OK: $(cat /tmp/body)"
              exit 0
            fi
            sleep 10
          done
          echo "keep-alive ping failed after 3 attempts"
          exit 1
